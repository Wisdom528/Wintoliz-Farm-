<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--primary:#0f3d2e;
--primary-light:#145c46;
--bg:#f4f7f5;
--white:#fff;
--text:#111827;
--danger:#dc2626;
--success:#16a34a;
--warning:#ea580c;
}

body{
background:linear-gradient(to bottom,#eef5f1,#f7faf8);
padding:25px;
color:var(--text);
}

.container{
max-width:1500px;
margin:auto;
}

/* TOPBAR */

.topbar{
background:linear-gradient(135deg,#0f3d2e,#145c46);
padding:25px;
border-radius:28px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
color:#fff;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
flex-wrap:wrap;
gap:20px;
}

.topbar h1{
font-size:36px;
font-weight:900;
}

.topbar p{
opacity:0.9;
margin-top:6px;
}

.logout-btn{
background:#fff;
color:#0f3d2e;
border:none;
padding:14px 20px;
border-radius:16px;
font-weight:800;
cursor:pointer;
font-size:14px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:25px;
}

.stat-card{
background:#fff;
padding:24px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.stat-title{
font-size:14px;
color:#666;
margin-bottom:10px;
font-weight:600;
}

.stat-number{
font-size:36px;
font-weight:900;
color:#0f3d2e;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:380px 1fr;
gap:24px;
margin-bottom:24px;
}

.card{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.section-title{
font-size:28px;
font-weight:900;
margin-bottom:22px;
color:#0f3d2e;
}

/* FORM */

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:800;
font-size:14px;
}

input,
textarea,
select{
width:100%;
padding:15px;
border-radius:16px;
border:1px solid #ddd;
outline:none;
font-size:14px;
background:#fff;
}

textarea{
resize:none;
min-height:120px;
}

input:focus,
textarea:focus,
select:focus{
border-color:#0f3d2e;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-weight:800;
cursor:pointer;
font-size:15px;
}

.primary-btn{
background:linear-gradient(135deg,#0f3d2e,#145c46);
color:#fff;
}

/* STATUS */

.status{
min-height:24px;
margin-bottom:14px;
font-weight:700;
}

.success{
color:green;
}

.error{
color:red;
}

/* PRODUCTS */

.products-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:12px;
flex-wrap:wrap;
}

.search-box{
width:300px;
}

.search-box input{
width:100%;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* PRODUCT CARD */

.product-card{
background:#fff;
border-radius:24px;
overflow:hidden;
border:1px solid #eee;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.product-image{
height:230px;
overflow:hidden;
background:#f5f7f6;
}

.product-image img{
width:100%;
height:100%;
object-fit:cover;
}

.product-content{
padding:20px;
}

.badge{
display:inline-block;
padding:8px 14px;
background:#eef7f2;
color:#0f3d2e;
border-radius:999px;
font-size:11px;
font-weight:900;
margin-bottom:14px;
}

.product-title{
font-size:22px;
font-weight:900;
margin-bottom:10px;
}

.product-description{
font-size:14px;
line-height:1.7;
color:#666;
margin-bottom:14px;
}

.product-price{
font-size:28px;
font-weight:900;
color:#0f3d2e;
margin-bottom:16px;
}

.product-actions{
display:flex;
gap:10px;
}

.action-btn{
flex:1;
padding:13px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
}

.edit-btn{
background:#111827;
color:#fff;
}

.delete-btn{
background:#dc2626;
color:#fff;
}

/* SUPPORT */

.support-grid{
display:grid;
gap:20px;
}

.support-card{
background:#fff;
border:1px solid #eee;
border-radius:24px;
padding:24px;
box-shadow:0 10px 25px rgba(0,0,0,0.04);
}

.support-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:16px;
flex-wrap:wrap;
}

.support-name{
font-size:24px;
font-weight:900;
color:#0f3d2e;
}

.support-status{
padding:8px 16px;
border-radius:999px;
font-size:12px;
font-weight:900;
}

.pending-status{
background:#fff7ed;
color:#ea580c;
}

.reviewed-status{
background:#ecfdf5;
color:#16a34a;
}

.support-meta{
display:grid;
gap:10px;
margin-bottom:18px;
font-size:14px;
color:#555;
}

.support-message{
background:#f7faf8;
padding:18px;
border-radius:18px;
line-height:1.8;
margin-bottom:18px;
font-size:14px;
}

.support-image{
width:100%;
max-height:350px;
object-fit:cover;
border-radius:20px;
margin-bottom:18px;
border:1px solid #eee;
}

/* ADMIN REPLY */

.admin-reply-box{
margin-top:20px;
}

.admin-reply{
background:#ecfdf5;
padding:18px;
border-radius:18px;
border:1px solid #bbf7d0;
margin-bottom:18px;
}

.reply-label{
font-size:13px;
font-weight:900;
color:#15803d;
margin-bottom:10px;
}

.reply-message{
font-size:14px;
line-height:1.8;
color:#14532d;
}

.reply-time{
margin-top:12px;
font-size:12px;
color:#666;
}

.reply-textarea{
width:100%;
min-height:110px;
padding:16px;
border-radius:18px;
border:1px solid #ddd;
resize:none;
outline:none;
margin-bottom:12px;
font-size:14px;
}

.reply-textarea:focus{
border-color:#0f3d2e;
}

.send-reply-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#0f3d2e,#145c46);
color:#fff;
font-weight:800;
cursor:pointer;
width:100%;
}

/* VERIFICATION */

.verification-box{
margin-top:20px;
padding:18px;
background:#f8fafc;
border-radius:18px;
border:1px solid #e5e7eb;
}

.verification-title{
font-size:14px;
font-weight:900;
margin-bottom:14px;
color:#0f3d2e;
}

.verification-actions{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.accept-btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:#16a34a;
color:#fff;
font-weight:800;
cursor:pointer;
min-width:160px;
}

.reject-btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:#dc2626;
color:#fff;
font-weight:800;
cursor:pointer;
min-width:160px;
}

/* ACTIONS */

.support-actions{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:18px;
}

.review-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:#0f3d2e;
color:#fff;
font-weight:800;
cursor:pointer;
}

.delete-support-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:#dc2626;
color:#fff;
font-weight:800;
cursor:pointer;
}

.empty{
padding:50px 20px;
text-align:center;
color:#666;
}

/* RESPONSIVE */

@media(max-width:1100px){

.dashboard{
grid-template-columns:1fr;
}

}

@media(max-width:700px){

body{
padding:15px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.products-header{
flex-direction:column;
align-items:stretch;
}

.search-box{
width:100%;
}

.product-actions,
.support-actions,
.verification-actions{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div>
<h1>🧑‍💼 Wintoliz Admin</h1>
<p>Manage products, orders and customer payment reviews</p>
</div>

<button class="logout-btn" onclick="logoutAdmin()">
Logout
</button>

</div>

<div class="stats">

<div class="stat-card">
<div class="stat-title">Total Products</div>
<div class="stat-number" id="totalProducts">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Categories</div>
<div class="stat-number" id="totalCategories">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Pending Verification</div>
<div class="stat-number" id="pendingMessages">0</div>
</div>

</div>

<div class="dashboard">

<div class="card">

<h2 class="section-title">
Add Product
</h2>

<div id="status" class="status"></div>

<div class="input-group">
<label>Product Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Price</label>
<input type="number" id="price">
</div>

<div class="input-group">
<label>Category</label>

<select id="category">
<option value="">Select category</option>
<option value="Eggs">Eggs</option>
<option value="Flock">Flock</option>
<option value="Drugs">Drugs</option>
<option value="Feeds">Feeds</option>
<option value="Equipment">Equipment</option>
</select>

</div>

<div class="input-group">
<label>Image URL</label>
<input type="text" id="image">
</div>

<div class="input-group">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<button
class="btn primary-btn"
id="submitBtn"
onclick="saveProduct()"
>
Add Product
</button>

</div>

<div class="card">

<div class="products-header">

<h2 class="section-title">
Marketplace Products
</h2>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search products..."
>
</div>

</div>

<div id="productsList" class="products-grid">

<div class="empty">
Loading products...
</div>

</div>

</div>

</div>

<div class="card">

<h2 class="section-title">
💬 Customer Payment Support
</h2>

<div id="supportMessages">

<div class="empty">
Loading support messages...
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot,
serverTimestamp,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDVFSZlzB8F9xzt2eWQAVKtS8BBgJ5FCu8",

authDomain: "wintoliz-2dca5.firebaseapp.com",

projectId: "wintoliz-2dca5",

storageBucket: "wintoliz-2dca5.firebasestorage.app",

messagingSenderId: "469698295508",

appId: "1:469698295508:web:5724ec6c9f88dc88fe6d41"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const ADMIN_EMAIL =
"wisdomotoide41@gmail.com";

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"index.html";

return;

}

if(
user.email.toLowerCase()
!== ADMIN_EMAIL.toLowerCase()
){

alert("Access denied");

window.location.href =
"product.html";

return;

}

});

const nameInput =
document.getElementById("name");

const priceInput =
document.getElementById("price");

const categoryInput =
document.getElementById("category");

const imageInput =
document.getElementById("image");

const descriptionInput =
document.getElementById("description");

const submitBtn =
document.getElementById("submitBtn");

const statusBox =
document.getElementById("status");

function showStatus(message,type){

statusBox.innerHTML = message;

statusBox.className =
"status " + type;

setTimeout(()=>{

statusBox.innerHTML = "";

},3000);

}

function validate(){

if(
!nameInput.value ||
!priceInput.value ||
!categoryInput.value
){

showStatus(
"Fill all required fields",
"error"
);

return false;

}

return true;

}

const productsList =
document.getElementById("productsList");

const totalProducts =
document.getElementById("totalProducts");

const totalCategories =
document.getElementById("totalCategories");

const searchInput =
document.getElementById("searchInput");

let allProducts = [];

let editingProductId = null;

window.saveProduct = async function(){

if(!validate()) return;

const productData = {

name:nameInput.value,

price:Number(priceInput.value),

category:categoryInput.value,

image:
imageInput.value ||
"https://via.placeholder.com/500x400",

description:
descriptionInput.value || ""

};

try{

if(editingProductId){

await updateDoc(
doc(db,"products",editingProductId),
productData
);

showStatus(
"Product updated ✔",
"success"
);

submitBtn.innerHTML =
"Add Product";

editingProductId = null;

}else{

await addDoc(
collection(db,"products"),
{
...productData,
createdAt:serverTimestamp()
}
);

showStatus(
"Product added ✔",
"success"
);

}

nameInput.value = "";
priceInput.value = "";
categoryInput.value = "";
imageInput.value = "";
descriptionInput.value = "";

}
catch(error){

console.log(error);

showStatus(
"Operation failed",
"error"
);

}

};

onSnapshot(

collection(db,"products"),

(snapshot)=>{

allProducts = [];

snapshot.forEach((docSnap)=>{

allProducts.push({

id:docSnap.id,
...docSnap.data()

});

});

renderProducts(allProducts);

}

);

function renderProducts(products){

productsList.innerHTML = "";

if(products.length === 0){

productsList.innerHTML = `
<div class="empty">
No products found
</div>
`;

totalProducts.innerHTML = 0;
totalCategories.innerHTML = 0;

return;

}

totalProducts.innerHTML =
products.length;

const categories = [
...new Set(products.map(
p => p.category
))
];

totalCategories.innerHTML =
categories.length;

products.forEach((p)=>{

productsList.innerHTML += `

<div class="product-card">

<div class="product-image">

<img
src="${p.image}"
alt="${p.name}"
>

</div>

<div class="product-content">

<div class="badge">
${p.category}
</div>

<div class="product-title">
${p.name}
</div>

<div class="product-description">
${p.description}
</div>

<div class="product-price">
₦${Number(p.price).toLocaleString()}
</div>

<div class="product-actions">

<button
class="action-btn edit-btn"
onclick="editProduct('${p.id}')"
>
Edit
</button>

<button
class="action-btn delete-btn"
onclick="deleteProduct('${p.id}')"
>
Delete
</button>

</div>

</div>

</div>

`;

});

}

searchInput.addEventListener(
"input",
()=>{

const keyword =
searchInput.value.toLowerCase();

const filtered =
allProducts.filter((p)=>
p.name.toLowerCase()
.includes(keyword)
);

renderProducts(filtered);

}
);

window.editProduct = function(id){

const product =
allProducts.find(
p => p.id === id
);

if(!product) return;

editingProductId = id;

nameInput.value =
product.name;

priceInput.value =
product.price;

categoryInput.value =
product.category;

imageInput.value =
product.image;

descriptionInput.value =
product.description;

submitBtn.innerHTML =
"Update Product";

window.scrollTo({
top:0,
behavior:"smooth"
});

};

window.deleteProduct =
async function(id){

const confirmDelete =
confirm(
"Delete this product?"
);

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,"products",id)
);

showStatus(
"Product deleted ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Delete failed",
"error"
);

}

};

const supportMessages =
document.getElementById("supportMessages");

const pendingMessages =
document.getElementById("pendingMessages");

const supportQuery = query(
collection(db,"supportMessages"),
orderBy("createdAt","desc")
);

onSnapshot(supportQuery,(snapshot)=>{

if(snapshot.empty){

supportMessages.innerHTML = `
<div class="empty">
No customer messages yet
</div>
`;

pendingMessages.innerHTML = 0;

return;

}

supportMessages.innerHTML = `
<div class="support-grid"></div>
`;

const grid =
supportMessages.querySelector(".support-grid");

let pendingCount = 0;

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

if(
data.status !== "Approved" &&
data.status !== "Rejected"
){
pendingCount++;
}

grid.innerHTML += `

<div class="support-card">

<div class="support-top">

<div class="support-name">
${data.username || 'Customer'}
</div>

<div class="
support-status
${data.status === 'Approved'
? 'reviewed-status'
: 'pending-status'}
">
${data.status || 'Pending Verification'}
</div>

</div>

<div class="support-meta">

<div>
📦 Order:
<strong>${data.order || 'Farm Products'}</strong>
</div>

<div>
💰 Amount:
<strong>
₦${Number(data.amount || 0).toLocaleString()}
</strong>
</div>

<div>
📅 Date:
<strong>
${data.date || ''}
</strong>
</div>

</div>

<div class="support-message">
${data.message || ''}
</div>

${
data.image
? `
<img
src="${data.image}"
class="support-image"
>
`
: ''
}

<div class="admin-reply-box">

${data.adminReply ? `

<div class="admin-reply">

<div class="reply-label">
🛡 Admin Reply
</div>

<div class="reply-message">
${data.adminReply}
</div>

<div class="reply-time">
${data.replyTime || ''}
</div>

</div>

` : `

<textarea
class="reply-textarea"
id="reply-${docSnap.id}"
placeholder="Type a reply to customer..."></textarea>

<button
class="send-reply-btn"
onclick="sendReply('${docSnap.id}')">
Send Reply
</button>

`}

</div>

<div class="verification-box">

<div class="verification-title">
🧾 Order Verification
</div>

<div class="verification-actions">

<button
class="accept-btn"
onclick="approveOrder('${docSnap.id}')"
>
✅ Accept Payment
</button>

<button
class="reject-btn"
onclick="rejectOrder('${docSnap.id}')"
>
❌ Reject Payment
</button>

</div>

</div>

<div class="support-actions">

<button
class="review-btn"
onclick="markReviewed('${docSnap.id}')"
>
✔ Mark Reviewed
</button>

<button
class="delete-support-btn"
onclick="deleteSupport('${docSnap.id}')"
>
🗑 Delete
</button>

</div>

</div>

`;

});

pendingMessages.innerHTML =
pendingCount;

});

window.markReviewed =
async function(id){

try{

await updateDoc(
doc(db,"supportMessages",id),
{
status:"Reviewed"
}
);

showStatus(
"Message reviewed ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Failed to update",
"error"
);

}

};

window.sendReply = async function(id){

const textarea =
document.getElementById(`reply-${id}`);

const message =
textarea.value.trim();

if(message === ""){

showStatus(
"Reply cannot be empty",
"error"
);

return;

}

try{

await updateDoc(
doc(db,"supportMessages",id),
{
adminReply:message,
replyTime:new Date().toLocaleString(),
status:"Reviewed"
}
);

showStatus(
"Reply sent successfully ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Failed to send reply",
"error"
);

}

};

window.approveOrder = async function(id){

try{

await updateDoc(
doc(db,"supportMessages",id),
{
status:"Approved",
verified:true,
verifiedAt:new Date().toLocaleString()
}
);

showStatus(
"Order approved successfully ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Failed to approve order",
"error"
);

}

};

window.rejectOrder = async function(id){

const reason = prompt(
"Why are you rejecting this payment?"
);

if(reason === null) return;

try{

await updateDoc(
doc(db,"supportMessages",id),
{
status:"Rejected",
rejectionReason:reason,
verified:false,
rejectedAt:new Date().toLocaleString()
}
);

showStatus(
"Order rejected",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Failed to reject order",
"error"
);

}

};

window.deleteSupport =
async function(id){

const confirmDelete =
confirm(
"Delete this support message?"
);

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,"supportMessages",id)
);

showStatus(
"Message deleted ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Delete failed",
"error"
);

}

};

window.logoutAdmin =
async function(){

try{

await signOut(auth);

window.location.href =
"index.html";

}
catch(error){

console.log(error);

}

};

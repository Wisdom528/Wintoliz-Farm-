<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

:root{
--primary:#0f3d2e;
--bg:#f4f7f5;
--white:#fff;
--text:#111827;
--danger:#dc2626;
}

body{
background:linear-gradient(to bottom,#eef5f1,#f7faf8);
padding:25px;
color:var(--text);
}

.container{
max-width:1400px;
margin:auto;
}

/* TOPBAR */

.topbar{
background:linear-gradient(135deg,#0f3d2e,#145c46);
padding:25px;
border-radius:24px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
color:#fff;
}

.topbar h1{
font-size:34px;
font-weight:900;
}

.topbar p{
opacity:0.9;
margin-top:5px;
}

.logout-btn{
background:#fff;
color:#0f3d2e;
border:none;
padding:14px 18px;
border-radius:14px;
font-weight:800;
cursor:pointer;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
margin-bottom:25px;
}

.stat-card{
background:#fff;
padding:22px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.stat-title{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.stat-number{
font-size:34px;
font-weight:900;
color:#0f3d2e;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:360px 1fr;
gap:24px;
}

.card{
background:#fff;
padding:24px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.section-title{
font-size:24px;
font-weight:900;
margin-bottom:20px;
color:#0f3d2e;
}

/* FORM */

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:700;
}

input,
textarea,
select{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid #ddd;
outline:none;
font-size:14px;
}

textarea{
resize:none;
min-height:120px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
}

.primary-btn{
background:linear-gradient(135deg,#0f3d2e,#145c46);
color:#fff;
}

/* STATUS */

.status{
min-height:24px;
margin-bottom:14px;
font-weight:700;
}

.success{
color:green;
}

.error{
color:red;
}

/* PRODUCTS */

.products-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:12px;
flex-wrap:wrap;
}

.search-box{
width:280px;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* PRODUCT CARD */

.product-card{
background:#fff;
border-radius:22px;
overflow:hidden;
border:1px solid #eee;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-5px);
box-shadow:0 18px 35px rgba(0,0,0,0.08);
}

.product-image{
height:220px;
overflow:hidden;
background:#f5f7f6;
}

.product-image img{
width:100%;
height:100%;
object-fit:cover;
}

.product-content{
padding:18px;
}

.badge{
display:inline-block;
padding:7px 12px;
background:#eef7f2;
color:#0f3d2e;
border-radius:999px;
font-size:11px;
font-weight:900;
margin-bottom:12px;
}

.product-title{
font-size:20px;
font-weight:900;
margin-bottom:8px;
}

.product-description{
font-size:13px;
line-height:1.6;
color:#666;
margin-bottom:14px;
}

.product-price{
font-size:24px;
font-weight:900;
color:#0f3d2e;
margin-bottom:16px;
}

.product-actions{
display:flex;
gap:10px;
}

.action-btn{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-weight:800;
cursor:pointer;
}

.edit-btn{
background:#111827;
color:#fff;
}

.delete-btn{
background:#dc2626;
color:#fff;
}

.empty{
padding:50px 20px;
text-align:center;
color:#666;
}

/* RESPONSIVE */

@media(max-width:1000px){

.dashboard{
grid-template-columns:1fr;
}

}

@media(max-width:700px){

body{
padding:15px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

.products-header{
flex-direction:column;
align-items:stretch;
}

.search-box{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<!-- TOPBAR -->

<div class="topbar">

<div>
<h1>🧑‍💼 Wintoliz Admin</h1>
<p>Manage marketplace products easily</p>
</div>

<button class="logout-btn" onclick="logoutAdmin()">
Logout
</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-card">
<div class="stat-title">Total Products</div>
<div class="stat-number" id="totalProducts">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Categories</div>
<div class="stat-number" id="totalCategories">0</div>
</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<!-- LEFT -->

<div class="card">

<h2 class="section-title">
Add Product
</h2>

<div id="status" class="status"></div>

<div class="input-group">
<label>Product Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Price</label>
<input type="number" id="price">
</div>

<div class="input-group">
<label>Category</label>

<select id="category">
<option value="">Select category</option>
<option value="Eggs">Eggs</option>
<option value="Flock">Flock</option>
<option value="Drugs">Drugs</option>
<option value="Feeds">Feeds</option>
<option value="Equipment">Equipment</option>
</select>

</div>

<div class="input-group">
<label>Image URL</label>
<input type="text" id="image">
</div>

<div class="input-group">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<button class="btn primary-btn" onclick="addProduct()">
Add Product
</button>

</div>

<!-- RIGHT -->

<div class="card">

<div class="products-header">

<h2 class="section-title">
Marketplace Products
</h2>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search products..."
>
</div>

</div>

<div id="productsList" class="products-grid">

<div class="empty">
Loading products...
</div>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyDVFSZlzB8F9xzt2eWQAVKtS8BBgJ5FCu8",

authDomain: "wintoliz-2dca5.firebaseapp.com",

projectId: "wintoliz-2dca5",

storageBucket: "wintoliz-2dca5.firebasestorage.app",

messagingSenderId: "469698295508",

appId: "1:469698295508:web:5724ec6c9f88dc88fe6d41"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* ADMIN EMAIL */

const ADMIN_EMAIL = "wisdomotoide41@gmail.com";

/* AUTH */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href = "index.html";
return;

}

if(user.email !== ADMIN_EMAIL){

alert("Access denied");

window.location.href = "product.html";

}

});

/* STATUS */

const statusBox =
document.getElementById("status");

function showStatus(message,type){

statusBox.innerHTML = message;

statusBox.className =
"status " + type;

setTimeout(()=>{

statusBox.innerHTML = "";

},3000);

}

/* VALIDATE */

function validate(){

if(
!name.value ||
!price.value ||
!category.value
){

showStatus(
"Fill all required fields",
"error"
);

return false;

}

return true;

}

/* ADD PRODUCT */

window.addProduct = async function(){

if(!validate()) return;

try{

await addDoc(
collection(db,"products"),
{
name:name.value,
price:Number(price.value),
category:category.value,
image:image.value || "https://via.placeholder.com/500x400",
description:description.value || "",
createdAt:serverTimestamp()
}
);

showStatus(
"Product added successfully ✔",
"success"
);

name.value = "";
price.value = "";
category.value = "";
image.value = "";
description.value = "";

}
catch(error){

console.log(error);

showStatus(
"Failed to add product",
"error"
);

}

};

/* PRODUCTS */

const productsList =
document.getElementById("productsList");

const totalProducts =
document.getElementById("totalProducts");

const totalCategories =
document.getElementById("totalCategories");

const searchInput =
document.getElementById("searchInput");

let allProducts = [];

/* REALTIME */

onSnapshot(

collection(db,"products"),

(snapshot)=>{

allProducts = [];

snapshot.forEach((docSnap)=>{

allProducts.push({

id:docSnap.id,
...docSnap.data()

});

});

renderProducts(allProducts);

},

(error)=>{

console.log("Firestore Error:", error);

productsList.innerHTML = `
<div class="empty">
Failed to load products
</div>
`;

}

);

/* RENDER */

function renderProducts(products){

productsList.innerHTML = "";

if(products.length === 0){

productsList.innerHTML = `
<div class="empty">
No products found
</div>
`;

totalProducts.innerHTML = 0;
totalCategories.innerHTML = 0;

return;

}

totalProducts.innerHTML =
products.length;

const categories = [
...new Set(products.map(p => p.category))
];

totalCategories.innerHTML =
categories.length;

products.forEach((p)=>{

const safeName =
(p.name || "").replace(/'/g,"\\'");

const safeCategory =
(p.category || "").replace(/'/g,"\\'");

const safeImage =
(p.image || "").replace(/'/g,"\\'");

const safeDescription =
(p.description || "")
.replace(/'/g,"\\'")
.replace(/"/g,'&quot;');

productsList.innerHTML += `

<div class="product-card">

<div class="product-image">

<img
src="${p.image || 'https://via.placeholder.com/400'}"
alt="${p.name}"
>

</div>

<div class="product-content">

<div class="badge">
${p.category || 'Product'}
</div>

<div class="product-title">
${p.name || 'Unnamed Product'}
</div>

<div class="product-description">
${p.description || 'No description'}
</div>

<div class="product-price">
₦${Number(p.price || 0).toLocaleString()}
</div>

<div class="product-actions">

<button
class="action-btn edit-btn"
onclick="editProduct(
'${p.id}',
'${safeName}',
'${p.price}',
'${safeCategory}',
'${safeImage}',
'${safeDescription}'
)"
>
Edit
</button>

<button
class="action-btn delete-btn"
onclick="deleteProduct('${p.id}')"
>
Delete
</button>

</div>

</div>

</div>

`;

});

}

/* SEARCH */

searchInput.addEventListener(
"input",
()=>{

const keyword =
searchInput.value.toLowerCase();

const filtered =
allProducts.filter((p)=>
p.name.toLowerCase().includes(keyword)
);

renderProducts(filtered);

}
);

/* EDIT */

window.editProduct = async function(
id,
oldName,
oldPrice,
oldCategory,
oldImage,
oldDescription
){

const newName =
prompt("Edit product name", oldName);

if(newName === null) return;

const newPrice =
prompt("Edit price", oldPrice);

const newCategory =
prompt("Edit category", oldCategory);

const newImage =
prompt("Edit image URL", oldImage);

const newDescription =
prompt("Edit description", oldDescription);

try{

await updateDoc(
doc(db,"products",id),
{
name:newName,
price:Number(newPrice),
category:newCategory,
image:newImage,
description:newDescription
}
);

showStatus(
"Product updated ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Update failed",
"error"
);

}

};

/* DELETE */

window.deleteProduct = async function(id){

const confirmDelete =
confirm("Delete this product?");

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,"products",id)
);

showStatus(
"Product deleted ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Delete failed",
"error"
);

}

};

/* LOGOUT */

window.logoutAdmin = async function(){

try{

await signOut(auth);

window.location.href =
"index.html";

}
catch(error){

console.log(error);

}

};

</script>

</body>
</html>

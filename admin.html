<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--primary:#0f3d2e;
--primary-light:#145c46;
--bg:#f4f7f5;
--white:#fff;
--text:#111827;
--danger:#dc2626;
--success:#16a34a;
--warning:#ea580c;
}

body{
background:linear-gradient(to bottom,#eef5f1,#f7faf8);
padding:25px;
color:var(--text);
}

.container{
max-width:1500px;
margin:auto;
}

/* TOPBAR */

.topbar{
background:linear-gradient(135deg,#0f3d2e,#145c46);
padding:25px;
border-radius:28px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
color:#fff;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
flex-wrap:wrap;
gap:20px;
}

.topbar h1{
font-size:36px;
font-weight:900;
}

.topbar p{
opacity:0.9;
margin-top:6px;
}

.logout-btn{
background:#fff;
color:#0f3d2e;
border:none;
padding:14px 20px;
border-radius:16px;
font-weight:800;
cursor:pointer;
font-size:14px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:25px;
}

.stat-card{
background:#fff;
padding:24px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.stat-title{
font-size:14px;
color:#666;
margin-bottom:10px;
font-weight:600;
}

.stat-number{
font-size:36px;
font-weight:900;
color:#0f3d2e;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:380px 1fr;
gap:24px;
margin-bottom:24px;
}

.card{
background:#fff;
padding:24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.section-title{
font-size:28px;
font-weight:900;
margin-bottom:22px;
color:#0f3d2e;
}

/* FORM */

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:800;
font-size:14px;
}

input,
textarea,
select{
width:100%;
padding:15px;
border-radius:16px;
border:1px solid #ddd;
outline:none;
font-size:14px;
background:#fff;
}

textarea{
resize:none;
min-height:120px;
}

input:focus,
textarea:focus,
select:focus{
border-color:#0f3d2e;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-weight:800;
cursor:pointer;
font-size:15px;
}

.primary-btn{
background:linear-gradient(135deg,#0f3d2e,#145c46);
color:#fff;
}

/* STATUS */

.status{
min-height:24px;
margin-bottom:14px;
font-weight:700;
}

.success{
color:green;
}

.error{
color:red;
}

/* PRODUCTS */

.products-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:12px;
flex-wrap:wrap;
}

.search-box{
width:300px;
}

.search-box input{
width:100%;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* PRODUCT CARD */

.product-card{
background:#fff;
border-radius:24px;
overflow:hidden;
border:1px solid #eee;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.product-image{
height:230px;
overflow:hidden;
background:#f5f7f6;
}

.product-image img{
width:100%;
height:100%;
object-fit:cover;
}

.product-content{
padding:20px;
}

.badge{
display:inline-block;
padding:8px 14px;
background:#eef7f2;
color:#0f3d2e;
border-radius:999px;
font-size:11px;
font-weight:900;
margin-bottom:14px;
}

.product-title{
font-size:22px;
font-weight:900;
margin-bottom:10px;
}

.product-description{
font-size:14px;
line-height:1.7;
color:#666;
margin-bottom:14px;
}

.product-price{
font-size:28px;
font-weight:900;
color:#0f3d2e;
margin-bottom:16px;
}

.product-actions{
display:flex;
gap:10px;
}

.action-btn{
flex:1;
padding:13px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
}

.edit-btn{
background:#111827;
color:#fff;
}

.delete-btn{
background:#dc2626;
color:#fff;
}

/* SUPPORT */

.support-grid{
display:grid;
gap:20px;
}

.support-card{
background:#fff;
border:1px solid #eee;
border-radius:24px;
padding:24px;
box-shadow:0 10px 25px rgba(0,0,0,0.04);
}

.support-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:16px;
flex-wrap:wrap;
}

.support-name{
font-size:24px;
font-weight:900;
color:#0f3d2e;
}

.support-status{
padding:8px 16px;
border-radius:999px;
font-size:12px;
font-weight:900;
}

.pending-status{
background:#fff7ed;
color:#ea580c;
}

.reviewed-status{
background:#ecfdf5;
color:#16a34a;
}

.review-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:#0f3d2e;
color:#fff;
font-weight:800;
cursor:pointer;
}

.delete-support-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:#dc2626;
color:#fff;
font-weight:800;
cursor:pointer;
}

.empty{
padding:50px 20px;
text-align:center;
color:#666;
}

@media(max-width:1100px){

.dashboard{
grid-template-columns:1fr;
}

}

@media(max-width:700px){

body{
padding:15px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.products-header{
flex-direction:column;
align-items:stretch;
}

.search-box{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div>
<h1>🧑‍💼 Wintoliz Admin</h1>
<p>Manage products and customer support chats</p>
</div>

<button class="logout-btn" onclick="logoutAdmin()">
Logout
</button>

</div>

<div class="stats">

<div class="stat-card">
<div class="stat-title">Total Products</div>
<div class="stat-number" id="totalProducts">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Categories</div>
<div class="stat-number" id="totalCategories">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Pending Chats</div>
<div class="stat-number" id="pendingMessages">0</div>
</div>

</div>

<div class="dashboard">

<div class="card">

<h2 class="section-title">
Add Product
</h2>

<div id="status" class="status"></div>

<div class="input-group">
<label>Product Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Price</label>
<input type="number" id="price">
</div>

<div class="input-group">
<label>Category</label>

<select id="category">
<option value="">Select category</option>
<option value="Eggs">Eggs</option>
<option value="Flock">Flock</option>
<option value="Drugs">Drugs</option>
<option value="Feeds">Feeds</option>
<option value="Equipment">Equipment</option>
</select>

</div>

<div class="input-group">
<label>Image URL</label>
<input type="text" id="image">
</div>

<div class="input-group">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<button
class="btn primary-btn"
id="submitBtn"
onclick="saveProduct()">
Add Product
</button>

</div>

<div class="card">

<div class="products-header">

<h2 class="section-title">
Marketplace Products
</h2>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search products...">
</div>

</div>

<div id="productsList" class="products-grid">

<div class="empty">
Loading products...
</div>

</div>

</div>

</div>

<div class="card">

<h2 class="section-title">
💬 Customer Support Chats
</h2>

<div id="supportMessages">

<div class="empty">
Loading chats...
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot,
serverTimestamp,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyDVFSZlzB8F9xzt2eWQAVKtS8BBgJ5FCu8",

authDomain: "wintoliz-2dca5.firebaseapp.com",

projectId: "wintoliz-2dca5",

storageBucket: "wintoliz-2dca5.firebasestorage.app",

messagingSenderId: "469698295508",

appId: "1:469698295508:web:5724ec6c9f88dc88fe6d41"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* ADMIN EMAIL */

const ADMIN_EMAIL =
"wisdomotoide41@gmail.com";

/* AUTH */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"index.html";

return;

}

if(
user.email.toLowerCase()
!== ADMIN_EMAIL.toLowerCase()
){

alert("Access denied");

window.location.href =
"product.html";

return;

}

});

/* STATUS */

const statusBox =
document.getElementById("status");

function showStatus(message,type){

statusBox.innerHTML = message;

statusBox.className =
"status " + type;

setTimeout(()=>{

statusBox.innerHTML = "";

},3000);

}

/* SUPPORT CHAT SYSTEM */

const supportMessages =
document.getElementById("supportMessages");

const pendingMessages =
document.getElementById("pendingMessages");

const supportQuery = query(
collection(db,"supportChats"),
orderBy("createdAt","desc")
);

onSnapshot(supportQuery,(snapshot)=>{

if(snapshot.empty){

supportMessages.innerHTML = `
<div class="empty">
No customer chats yet
</div>
`;

pendingMessages.innerHTML = 0;

return;

}

supportMessages.innerHTML =
`<div class="support-grid"></div>`;

const grid =
supportMessages.querySelector(".support-grid");

let pendingCount = 0;

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

if(data.status !== "Reviewed"){
pendingCount++;
}

grid.innerHTML += `

<div class="support-card">

<div class="support-top">

<div class="support-name">
${data.username || 'Customer'}
</div>

<div class="
support-status
${data.status === 'Reviewed'
? 'reviewed-status'
: 'pending-status'}
">
${data.status || 'Pending'}
</div>

</div>

<div style="
margin-bottom:18px;
font-size:14px;
color:#666;
">
Chat ID:
<strong>${docSnap.id}</strong>
</div>

<div id="messages-${docSnap.id}">
Loading messages...
</div>

<div style="
margin-top:18px;
display:flex;
gap:12px;
flex-wrap:wrap;
">

<textarea
id="reply-${docSnap.id}"
placeholder="Reply customer..."
style="
flex:1;
min-height:70px;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
"></textarea>

<button
class="review-btn"
onclick="sendReply('${docSnap.id}')">
Send Reply
</button>

<button
class="delete-support-btn"
onclick="deleteChat('${docSnap.id}')">
Delete Chat
</button>

</div>

</div>

`;

loadMessages(docSnap.id);

});

pendingMessages.innerHTML =
pendingCount;

});

/* LOAD MESSAGES */

function loadMessages(chatId){

const messagesBox =
document.getElementById(`messages-${chatId}`);

const messagesQuery = query(
collection(
db,
"supportChats",
chatId,
"messages"
),
orderBy("createdAt","asc")
);

onSnapshot(messagesQuery,(snapshot)=>{

messagesBox.innerHTML = "";

snapshot.forEach((msg)=>{

const data = msg.data();

messagesBox.innerHTML += `

<div style="
background:${data.sender === 'admin'
? '#eef7f2'
: '#f7faf8'};
padding:16px;
border-radius:16px;
margin-bottom:12px;
">

<div style="
font-weight:800;
margin-bottom:8px;
color:#0f3d2e;
">
${data.sender === 'admin'
? 'Admin'
: 'Customer'}
</div>

<div style="
line-height:1.7;
margin-bottom:10px;
">
${data.text || ''}
</div>

${
data.image
? `
<img
src="${data.image}"
style="
width:100%;
max-height:250px;
object-fit:cover;
border-radius:16px;
margin-top:10px;
">
`
: ''
}

<div style="
font-size:12px;
color:#666;
margin-top:10px;
">
${data.time || ''}
</div>

</div>

`;

});

});

}

/* SEND ADMIN REPLY */

window.sendReply =
async function(chatId){

const replyInput =
document.getElementById(`reply-${chatId}`);

const text =
replyInput.value.trim();

if(!text) return;

try{

await addDoc(

collection(
db,
"supportChats",
chatId,
"messages"
),

{
sender:"admin",
text:text,
image:"",
time:new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
}),
createdAt:serverTimestamp()
}

);

await updateDoc(
doc(db,"supportChats",chatId),
{
status:"Reviewed"
}
);

replyInput.value = "";

showStatus(
"Reply sent ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Failed to send reply",
"error"
);

}

};

/* DELETE CHAT */

window.deleteChat =
async function(chatId){

const confirmDelete =
confirm("Delete this chat?");

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,"supportChats",chatId)
);

showStatus(
"Chat deleted ✔",
"success"
);

}
catch(error){

console.log(error);

showStatus(
"Delete failed",
"error"
);

}

};

/* LOGOUT */

window.logoutAdmin =
async function(){

try{

await signOut(auth);

window.location.href =
"index.html";

}
catch(error){

console.log(error);

}

};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Cart & Orders</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--primary:#0f3d2e;
--primary-light:#145c46;
--gold:#ffb800;
--bg:#f4f7f5;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--danger:#ef4444;
--success:#16a34a;
--shadow:0 10px 30px rgba(0,0,0,0.08);
}

body{
background:linear-gradient(to bottom,#f4f7f5,#edf5f1);
color:var(--text);
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
background:rgba(15,61,46,0.97);
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
backdrop-filter:blur(14px);
box-shadow:0 5px 20px rgba(0,0,0,0.12);
}

.logo-area{
display:flex;
align-items:center;
gap:14px;
}

.logo-box{
width:58px;
height:58px;
border-radius:18px;
overflow:hidden;
background:rgba(255,255,255,0.1);
padding:6px;
}

.logo-box img{
width:100%;
height:100%;
object-fit:contain;
}

.logo-text{
font-size:26px;
font-weight:900;
color:#fff;
}

.logo-text span{
color:var(--gold);
}

/* NAVIGATION */

.nav-area{
display:flex;
align-items:center;
gap:12px;
position:relative;
}

.menu-toggle{
display:none;
background:var(--gold);
border:none;
padding:12px 16px;
border-radius:14px;
font-size:22px;
font-weight:900;
cursor:pointer;
}

.dropdown-nav{
display:flex;
gap:12px;
align-items:center;
}

.nav-btn{
padding:12px 18px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
background:#fff;
color:var(--primary);
transition:0.3s;
}

.nav-btn:hover{
transform:translateY(-2px);
}

.logout-btn{
background:var(--danger);
color:#fff;
}

/* HERO */

.hero{
padding:55px 24px;
background:
linear-gradient(rgba(10,30,20,0.82),rgba(10,30,20,0.88)),
url('https://images.unsplash.com/photo-1548767797-d8c844163c4c?q=80&w=1400&auto=format&fit=crop') center/cover;
color:#fff;
}

.hero h1{
font-size:46px;
font-weight:900;
margin-bottom:14px;
}

.hero p{
max-width:720px;
line-height:1.8;
opacity:0.92;
font-size:16px;
}

/* MAIN */

.wrapper{
padding:24px;
display:grid;
grid-template-columns:1fr 370px;
gap:24px;
}

/* CARDS */

.section-card{
background:#fff;
border-radius:30px;
padding:24px;
box-shadow:var(--shadow);
border:1px solid rgba(0,0,0,0.04);
}

.section-title{
font-size:28px;
font-weight:900;
margin-bottom:24px;
}

/* CART */

.cart-items{
display:grid;
gap:20px;
}

.cart-item{
display:flex;
gap:20px;
align-items:center;
padding:18px;
border-radius:24px;
background:#fcfdfc;
border:1px solid #edf2ef;
transition:0.3s;
}

.cart-item:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.cart-image{
width:120px;
height:120px;
border-radius:22px;
overflow:hidden;
background:#f3f4f6;
flex-shrink:0;
}

.cart-image img{
width:100%;
height:100%;
object-fit:cover;
}

.cart-content{
flex:1;
}

.cart-content h3{
font-size:22px;
margin-bottom:10px;
font-weight:900;
}

.cart-content p{
font-size:14px;
color:var(--muted);
line-height:1.7;
margin-bottom:14px;
}

.price{
font-size:26px;
font-weight:900;
color:var(--primary);
}

.cart-actions{
display:flex;
gap:12px;
margin-top:16px;
flex-wrap:wrap;
}

.quantity-box{
display:flex;
align-items:center;
gap:12px;
background:#eef7f2;
padding:10px 14px;
border-radius:16px;
font-weight:900;
}

.qty-btn{
width:34px;
height:34px;
border:none;
border-radius:12px;
background:var(--primary);
color:#fff;
font-weight:900;
cursor:pointer;
transition:0.3s;
}

.qty-btn:hover{
background:var(--primary-light);
}

.remove-btn{
padding:12px 18px;
border:none;
border-radius:16px;
background:var(--danger);
color:#fff;
font-weight:800;
cursor:pointer;
}

/* SUMMARY */

.summary-card{
position:sticky;
top:100px;
height:fit-content;
}

.summary-row{
display:flex;
justify-content:space-between;
margin-bottom:18px;
font-size:15px;
color:var(--muted);
}

.summary-total{
font-size:34px;
font-weight:900;
color:var(--primary);
margin:24px 0;
}

.checkout-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#0f3d2e,#145c46);
color:#fff;
font-size:16px;
font-weight:800;
cursor:pointer;
margin-bottom:12px;
transition:0.3s;
}

.checkout-btn:hover{
transform:translateY(-2px);
}

.clear-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#eef2f1;
font-weight:800;
cursor:pointer;
}

/* ORDERS */

.orders-section{
padding:0 24px 30px;
}

.orders-grid{
display:grid;
gap:18px;
}

.order-card{
padding:22px;
border-radius:24px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:16px;
background:#fff;
border:1px solid #edf2ef;
box-shadow:var(--shadow);
}

.order-info h3{
font-size:21px;
margin-bottom:8px;
font-weight:900;
}

.order-info p{
color:var(--muted);
font-size:14px;
}

.status{
padding:8px 16px;
border-radius:999px;
font-size:12px;
font-weight:900;
}

.pending{
background:#fff7ed;
color:#ea580c;
}

.completed{
background:#ecfdf5;
color:var(--success);
}

.empty{
padding:60px 20px;
text-align:center;
color:var(--muted);
font-weight:700;
}

/* MOBILE */

@media(max-width:950px){

.wrapper{
grid-template-columns:1fr;
}

.summary-card{
position:relative;
top:0;
}

}

@media(max-width:768px){

.topbar{
padding:16px;
}

.menu-toggle{
display:block;
}

.dropdown-nav{
position:absolute;
top:70px;
right:0;
background:#0f3d2e;
padding:16px;
border-radius:22px;
flex-direction:column;
width:230px;
display:none;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.dropdown-nav.active{
display:flex;
}

.nav-btn{
width:100%;
}

.hero{
padding:36px 16px;
}

.hero h1{
font-size:34px;
}

.wrapper,
.orders-section{
padding-left:16px;
padding-right:16px;
}

.cart-item{
flex-direction:column;
align-items:flex-start;
}

.cart-image{
width:100%;
height:220px;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo-area">

<div class="logo-box">
<img src="./asset/image/image.png" alt="Logo">
</div>

<div class="logo-text">
<span>Wintoliz</span> Farms
</div>

</div>

<div class="nav-area">

<button class="menu-toggle" onclick="toggleMenu()">
☰
</button>

<div class="dropdown-nav" id="dropdownNav">

<button
class="nav-btn"
onclick="window.location.href='product.html'">
Marketplace
</button>

<button
class="nav-btn"
onclick="window.location.href='dashboard.html'">
Dashboard
</button>

<button
class="nav-btn"
onclick="window.location.href='payment.html'">
Payments
</button>

<button
class="nav-btn logout-btn"
onclick="logout()">
Logout
</button>

</div>

</div>

</div>

<!-- HERO -->

<div class="hero">

<h1>
My Cart & Orders 🛒
</h1>

<p>
Manage your marketplace cart professionally, review products, track orders and proceed to secure payment seamlessly.
</p>

</div>

<!-- MAIN -->

<div class="wrapper">

<!-- CART -->

<div class="section-card">

<h2 class="section-title">
Shopping Cart
</h2>

<div class="cart-items" id="cartItems">

<div class="empty">
Your cart is empty
</div>

</div>

</div>

<!-- SUMMARY -->

<div class="section-card summary-card">

<h2 class="section-title">
Order Summary
</h2>

<div class="summary-row">
<span>Items</span>
<span id="totalItems">0</span>
</div>

<div class="summary-row">
<span>Delivery</span>
<span>₦500</span>
</div>

<div class="summary-row">
<span>Subtotal</span>
<span id="subtotal">₦0</span>
</div>

<div class="summary-total" id="grandTotal">
₦0
</div>

<button
class="checkout-btn"
onclick="checkout()">
Proceed To Payment
</button>

<button
class="clear-btn"
onclick="clearCart()">
Clear Cart
</button>

</div>

</div>

<!-- ORDERS -->

<div class="orders-section">

<div class="section-card">

<h2 class="section-title">
Recent Orders
</h2>

<div class="orders-grid" id="ordersList">

<div class="empty">
No orders placed yet
</div>

</div>

</div>

</div>

<script>

/* MOBILE NAV */

function toggleMenu(){

document
.getElementById('dropdownNav')
.classList.toggle('active');

}

/* USER */

const user = JSON.parse(
localStorage.getItem('wintolizUser')
) || {
username:'User'
};

/* CART */

let cart = JSON.parse(
localStorage.getItem('wintolizCart')
) || [];

/* ORDERS */

let orders = JSON.parse(
localStorage.getItem('wintolizOrders')
) || [];

/* RENDER CART */

function renderCart(){

const cartItems =
document.getElementById('cartItems');

if(cart.length === 0){

cartItems.innerHTML = `
<div class="empty">
Your cart is empty
</div>
`;

updateSummary();
return;

}

cartItems.innerHTML = '';

cart.forEach((item,index)=>{

cartItems.innerHTML += `

<div class="cart-item">

<div class="cart-image">
<img
src="${item.image || 'https://via.placeholder.com/400'}"
onerror="this.src='https://via.placeholder.com/400'"
>
</div>

<div class="cart-content">

<h3>${item.name}</h3>

<p>
${item.description || 'Fresh marketplace product'}
</p>

<div class="price">
₦${Number(item.price).toLocaleString()}
</div>

<div class="cart-actions">

<div class="quantity-box">

<button
class="qty-btn"
onclick="changeQty(${index},-1)">
-
</button>

<span>${item.qty || 1}</span>

<button
class="qty-btn"
onclick="changeQty(${index},1)">
+
</button>

</div>

<button
class="remove-btn"
onclick="removeItem(${index})">
Remove
</button>

</div>

</div>

</div>

`;

});

updateSummary();

}

/* SUMMARY */

function updateSummary(){

const totalItems =
cart.reduce((sum,item)=>sum + (item.qty || 1),0);

const subtotal =
cart.reduce((sum,item)=>sum + (Number(item.price) * (item.qty || 1)),0);

const delivery = cart.length > 0 ? 500 : 0;

const total = subtotal + delivery;

document.getElementById('totalItems').innerText =
totalItems;

document.getElementById('subtotal').innerText =
'₦' + subtotal.toLocaleString();

document.getElementById('grandTotal').innerText =
'₦' + total.toLocaleString();

}

/* CHANGE QUANTITY */

function changeQty(index,change){

if(!cart[index].qty){
cart[index].qty = 1;
}

cart[index].qty += change;

if(cart[index].qty <= 0){
cart.splice(index,1);
}

saveCart();
renderCart();

}

/* REMOVE ITEM */

function removeItem(index){

cart.splice(index,1);

saveCart();
renderCart();

}

/* CLEAR CART */

function clearCart(){

cart = [];

saveCart();
renderCart();

}

/* SAVE CART */

function saveCart(){

localStorage.setItem(
'wintolizCart',
JSON.stringify(cart)
);

}

/* CHECKOUT */

function checkout(){

if(cart.length === 0){

alert('Cart is empty');
return;

}

localStorage.setItem(
'wintolizCheckoutCart',
JSON.stringify(cart)
);

/* GO TO PAYMENT PAGE */

window.location.href = 'payment.html';

}

/* RENDER ORDERS */

function renderOrders(){

const ordersList =
document.getElementById('ordersList');

const userOrders =
orders.filter(o=>o.username === user.username);

if(userOrders.length === 0){

ordersList.innerHTML = `
<div class="empty">
No orders placed yet
</div>
`;

return;

}

ordersList.innerHTML = '';

userOrders.forEach(order=>{

ordersList.innerHTML += `

<div class="order-card">

<div class="order-info">

<h3>
${order.product}
</h3>

<p>
${order.date}
</p>

</div>

<div>

<div style="
font-size:22px;
font-weight:900;
margin-bottom:10px;
text-align:right;
">
₦${Number(order.total).toLocaleString()}
</div>

<div class="status ${order.status === 'Completed' ? 'completed' : 'pending'}">
${order.status}
</div>

</div>

</div>

`;

});

}

/* LOGOUT */

function logout(){

localStorage.removeItem('wintolizUser');

window.location.href = 'index.html';

}

renderCart();
renderOrders();

</script>

</body>
</html>

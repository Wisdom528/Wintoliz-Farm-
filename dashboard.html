<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wintoliz Farms Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --panel:#0f172a;
  --card:#111827;
  --muted:#94a3b8;
  --text:#e5e7eb;
  --primary:#3b82f6;
  --primary2:#2563eb;
  --border:rgba(255,255,255,0.06);
  --radius:14px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', sans-serif;
}

body{
background:radial-gradient(circle at top, #111827, var(--bg));
color:var(--text);
min-height:100vh;
}

/* LOGIN */
.login-page{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.login-box{
background:rgba(17,24,39,0.9);
backdrop-filter: blur(10px);
padding:28px;
border-radius:var(--radius);
width:340px;
border:1px solid var(--border);
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.login-box h2{
text-align:center;
margin-bottom:18px;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#0b1220;
color:#fff;
outline:none;
border:1px solid var(--border);
}

.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#fff;
font-weight:600;
transition:0.3s;
}

.login-box button:hover{
transform:translateY(-2px);
}

/* DASHBOARD */
.dashboard{
display:none;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 22px;
background:rgba(15,23,42,0.8);
backdrop-filter: blur(10px);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:10;
}

header h1{
font-size:18px;
}

.container{
display:flex;
min-height:calc(100vh - 60px);
}

.sidebar{
width:240px;
padding:18px;
background:rgba(15,23,42,0.6);
border-right:1px solid var(--border);
}

.sidebar a{
display:block;
color:var(--text);
text-decoration:none;
padding:12px;
border-radius:10px;
margin-bottom:8px;
background:rgba(17,24,39,0.6);
transition:0.2s;
}

.sidebar a:hover{
background:rgba(59,130,246,0.15);
}

.main{
flex:1;
padding:22px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
margin-bottom:20px;
}

.card{
background:rgba(17,24,39,0.7);
backdrop-filter: blur(10px);
padding:18px;
border-radius:var(--radius);
border:1px solid var(--border);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

.card h2{
font-size:22px;
margin-bottom:6px;
}

.card p{
color:var(--muted);
font-size:13px;
}

.form{
background:rgba(17,24,39,0.7);
padding:18px;
border-radius:var(--radius);
margin-bottom:20px;
border:1px solid var(--border);
}

.form h3{
margin-bottom:12px;
}

.form input, .form textarea{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#0b1220;
color:#fff;
border:1px solid var(--border);
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#fff;
font-weight:600;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
}

.product{
background:rgba(17,24,39,0.7);
padding:15px;
border-radius:var(--radius);
border:1px solid var(--border);
transition:0.3s;
}

.product:hover{
transform:translateY(-4px);
}

.product img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

.product h4{
margin-bottom:6px;
}

small{
color:var(--muted);
}

@media(max-width:768px){
.sidebar{display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h2>🌾 Wintoliz Farms</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<header>
<h1>🌾 Dashboard</h1>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="sidebar">
<a href="#">Overview</a>
<a href="#">My Products</a>
<a href="#">Orders</a>
<a href="#">Profile</a>
</div>

<div class="main">

<div class="cards">
<div class="card">
<h2 id="welcomeUser">Welcome</h2>
<p>Active Account</p>
</div>
<div class="card">
<h2 id="totalProducts">0</h2>
<p>Your Products</p>
</div>
</div>

<div class="form">
<h3>Add Product</h3>
<input type="text" id="name" placeholder="Product name" />
<input type="text" id="price" placeholder="Price" />
<input type="text" id="image" placeholder="Image URL" />
<textarea id="desc" placeholder="Description"></textarea>
<button onclick="addProduct()">Add Product</button>
</div>

<div class="products" id="productList"></div>

</div>
</div>
</div>

<script>
let products = [];
let currentUser = null;

function login(){
const user = document.getElementById('username').value;
const pass = document.getElementById('password').value;

if(!user || !pass) return alert('Enter login details');

currentUser = user;
document.getElementById('loginPage').style.display = 'none';
document.getElementById('dashboard').style.display = 'block';
document.getElementById('welcomeUser').innerText = 'Welcome, ' + user;
}

function logout(){ location.reload(); }

function addProduct(){
const name = document.getElementById('name').value;
const price = document.getElementById('price').value;
const image = document.getElementById('image').value;
const desc = document.getElementById('desc').value;

if(!name || !price || !image) return alert('Fill required fields');

products.push({name, price, image, desc, user: currentUser});
renderProducts();
updateStats();

// clear
['name','price','image','desc'].forEach(id=>document.getElementById(id).value='');
}

function renderProducts(){
const list = document.getElementById('productList');
list.innerHTML = '';

products.filter(p=>p.user===currentUser).forEach(p=>{
list.innerHTML += `
<div class="product">
<img src="${p.image}" />
<h4>${p.name}</h4>
<p>${p.desc}</p>
<small>₦${p.price}</small>
</div>
`;
});
}

function updateStats(){
document.getElementById('totalProducts').innerText = products.filter(p=>p.user===currentUser).length;
}
</script>

</body>
</html>

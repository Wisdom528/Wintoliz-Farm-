<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Farms Marketplace</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--primary:#0f3d2e;
--primary-light:#145c46;
--gold:#ffb800;
--bg:#f4f7f5;
--white:#fff;
--text:#111827;
--muted:#6b7280;
--danger:#ff4d4d;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:1000;
background:rgba(15,61,46,0.97);
padding:16px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* LOGO */

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-image-wrapper{
width:55px;
height:55px;
border-radius:16px;
overflow:hidden;
background:rgba(255,255,255,0.1);
padding:6px;
}

.logo-img{
width:100%;
height:100%;
object-fit:contain;
}

.logo-text{
font-size:26px;
font-weight:900;
color:#fff;
}

.logo-text span{
color:var(--gold);
}

/* NAV */

nav{
display:flex;
align-items:center;
gap:12px;
position:relative;
}

.menu-toggle{
display:none;
background:var(--gold);
border:none;
padding:10px 14px;
border-radius:12px;
font-size:22px;
font-weight:900;
cursor:pointer;
}

.nav-menu{
display:flex;
align-items:center;
gap:12px;
}

.nav-link{
color:#fff;
font-weight:700;
font-size:14px;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.nav-link:hover{
background:rgba(255,255,255,0.1);
}

.nav-link.active{
background:var(--gold);
color:#000;
}

.admin-btn{
background:var(--gold);
color:#000;
border:none;
padding:10px 14px;
border-radius:12px;
font-weight:800;
cursor:pointer;
display:none;
}

.logout-btn{
background:var(--danger);
color:#fff;
border:none;
padding:10px 14px;
border-radius:12px;
font-weight:800;
cursor:pointer;
}

/* HERO */

.hero{
padding:70px 20px;
text-align:center;
background:
linear-gradient(rgba(10,30,20,0.85),rgba(10,30,20,0.9)),
url('https://images.unsplash.com/photo-1548767797-d8c844163c4c?q=80&w=1400&auto=format&fit=crop') center/cover;
color:#fff;
}

.hero h1{
font-size:48px;
font-weight:900;
margin-bottom:12px;
}

.hero p{
max-width:700px;
margin:auto;
line-height:1.8;
opacity:0.95;
}

/* LAYOUT */

.wrapper{
display:grid;
grid-template-columns:260px 1fr;
gap:24px;
padding:25px;
}

/* SIDEBAR */

.sidebar{
background:#fff;
padding:20px;
border-radius:24px;
height:fit-content;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.sidebar h3{
margin-bottom:14px;
font-size:18px;
}

.search-box input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
outline:none;
margin-bottom:20px;
}

.filter-item{
display:flex;
gap:10px;
margin-bottom:12px;
font-size:15px;
cursor:pointer;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:22px;
}

/* CARD */

.card{
background:#fff;
border-radius:22px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.3s;
border:1px solid rgba(0,0,0,0.05);
}

.card:hover{
transform:translateY(-6px);
}

.card-image{
height:210px;
overflow:hidden;
background:#f3f6f4;
}

.card-image img{
width:100%;
height:100%;
object-fit:cover;
}

.card-content{
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.category{
display:inline-block;
padding:7px 12px;
border-radius:999px;
background:#eef7f2;
color:var(--primary);
font-size:12px;
font-weight:800;
width:fit-content;
}

.card h3{
font-size:19px;
font-weight:900;
}

.description{
font-size:14px;
color:var(--muted);
line-height:1.6;
}

.price{
font-size:24px;
font-weight:900;
color:var(--primary);
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#0f3d2e,#145c46);
color:#fff;
font-weight:800;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
}

.empty{
text-align:center;
padding:40px;
color:#666;
font-weight:600;
}

/* MOBILE */

@media(max-width:900px){

.wrapper{
grid-template-columns:1fr;
}

.hero h1{
font-size:34px;
}

}

@media(max-width:768px){

header{
padding:16px;
}

.menu-toggle{
display:block;
}

.nav-menu{
position:absolute;
top:65px;
right:0;
background:#0f3d2e;
padding:16px;
border-radius:18px;
flex-direction:column;
align-items:stretch;
width:220px;
display:none;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.nav-menu.active{
display:flex;
}

.nav-link,
.admin-btn,
.logout-btn{
width:100%;
text-align:center;
}

}

</style>
</head>

<body>

<header>

<div class="logo-area">

<div class="logo-image-wrapper">
<img src="./asset/image/image.png" class="logo-img">
</div>

<div class="logo-text">
<span>Wintoliz</span> Farms
</div>

</div>

<nav>

<button class="menu-toggle" onclick="toggleMobileMenu()">
☰
</button>

<div class="nav-menu" id="navMenu">

<div class="nav-link active">
Marketplace
</div>

<div
class="nav-link"
onclick="window.location.href='cart.html'">
Cart
</div>

<div
class="nav-link"
onclick="window.location.href='dashboard.html'">
My Account
</div>

<button
id="adminBtn"
class="admin-btn"
onclick="window.location.href='admin.html'">
Admin Panel
</button>

<button class="logout-btn" onclick="logoutUser()">
Logout
</button>

</div>

</nav>

</header>

<section class="hero">

<h1>
Fresh Poultry Products Across Nigeria
</h1>

<p>
Buy healthy birds, eggs, vaccines, feeds and equipment directly from trusted farms.
</p>

</section>

<div class="wrapper">

<div class="sidebar">

<h3>Search</h3>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products...">
</div>

<h3>Categories</h3>

<label class="filter-item">
<input type="checkbox" class="filter" value="Eggs"> Eggs
</label>

<label class="filter-item">
<input type="checkbox" class="filter" value="Flock"> Flock
</label>

<label class="filter-item">
<input type="checkbox" class="filter" value="Drugs"> Drugs
</label>

<label class="filter-item">
<input type="checkbox" class="filter" value="Feeds"> Feeds
</label>

<label class="filter-item">
<input type="checkbox" class="filter" value="Equipment"> Equipment
</label>

</div>

<div class="products" id="products">

<div class="empty">
Loading products...
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import {
getFirestore,
collection,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyDVFSZlzB8F9xzt2eWQAVKtS8BBgJ5FCu8",

authDomain: "wintoliz-2dca5.firebaseapp.com",

projectId: "wintoliz-2dca5",

storageBucket: "wintoliz-2dca5.firebasestorage.app",

messagingSenderId: "469698295508",

appId: "1:469698295508:web:5724ec6c9f88dc88fe6d41"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* ADMIN EMAIL */

const ADMIN_EMAIL = "wisdomotoide41@gmail.com";

/* AUTH CHECK */

onAuthStateChanged(auth, (user) => {

if(user){

console.log("User logged in");

if(user.email === ADMIN_EMAIL){

document.getElementById("adminBtn").style.display = "block";

}

}else{

window.location.href = "index.html";

}

});

/* MOBILE MENU */

window.toggleMobileMenu = function(){

document
.getElementById("navMenu")
.classList.toggle("active");

};

/* LOGOUT */

window.logoutUser = async function(){

try{

await signOut(auth);

window.location.href = "index.html";

}catch(error){

console.log(error);

}

};

/* CART */

let cart = JSON.parse(
localStorage.getItem("wintolizCart")
) || [];

function saveCart(){

localStorage.setItem(
"wintolizCart",
JSON.stringify(cart)
);

}

/* ADD TO CART */

window.addToCart = function(product){

let existingItem = cart.find(
item => item.name === product.name
);

if(existingItem){

existingItem.qty = (existingItem.qty || 1) + 1;

}else{

cart.push({
name: product.name,
price: Number(product.price),
image: product.image || '',
description: product.description || '',
qty: 1
});

}

saveCart();

window.location.href = "cart.html";

};

/* FILTERS */

const filters =
document.querySelectorAll(".filter");

const searchInput =
document.getElementById("searchInput");

let allProducts = [];

/* FILTER PRODUCTS */

function filterProducts(){

const keyword =
searchInput.value.toLowerCase();

const activeFilters =
[...filters]
.filter(f => f.checked)
.map(f => f.value);

const filtered =
allProducts.filter(product => {

const matchesSearch =
(product.name || "")
.toLowerCase()
.includes(keyword);

const matchesCategory =

activeFilters.length === 0 ||

activeFilters.includes(product.category);

return matchesSearch && matchesCategory;

});

renderProducts(filtered);

}

/* SEARCH */

searchInput.addEventListener(
"input",
filterProducts
);

/* CATEGORY FILTER */

filters.forEach(filter => {

filter.addEventListener(
"change",
filterProducts
);

});

/* RENDER PRODUCTS */

function renderProducts(products){

const container =
document.getElementById("products");

container.innerHTML = "";

if(products.length === 0){

container.innerHTML = `
<div class="empty">
No matching products found
</div>
`;

return;

}

products.forEach((p)=>{

const productData = encodeURIComponent(JSON.stringify({
name: p.name || "Unnamed Product",
price: Number(p.price || 0),
image: p.image || "",
description: p.description || ""
}));

container.innerHTML += `

<div class="card">

<div class="card-image">

<img
src="${p.image || 'https://via.placeholder.com/400'}"
onerror="this.src='https://via.placeholder.com/400'"
>

</div>

<div class="card-content">

<div class="category">
${p.category || 'Uncategorized'}
</div>

<h3>
${p.name || 'Unnamed Product'}
</h3>

<p class="description">
${p.description || ''}
</p>

<div class="price">
₦${Number(p.price || 0).toLocaleString()}
</div>

<button
class="btn"
onclick='addToCart(JSON.parse(decodeURIComponent("${productData}")))'
>
Add To Cart
</button>

</div>

</div>

`;

});

}

/* LOAD PRODUCTS */

function loadProducts(){

onSnapshot(

collection(db,"products"),

(snapshot)=>{

allProducts = [];

snapshot.forEach((doc)=>{

allProducts.push(doc.data());

});

filterProducts();

},

(error)=>{

console.log(error);

document.getElementById("products").innerHTML = `
<div class="empty">
Failed to load products
</div>
`;

}

);

}

loadProducts();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Farms Marketplace</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

:root{
--primary:#0f3d2e;
--primary-light:#145c46;
--gold:#ffb800;
--bg:#f4f7f5;
--white:#fff;
--text:#111827;
--muted:#6b7280;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;
top:0;
z-index:1000;
background:rgba(15,61,46,0.97);
padding:16px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo-image-wrapper{
width:54px;
height:54px;
border-radius:14px;
overflow:hidden;
background:rgba(255,255,255,0.1);
padding:6px;
}

.logo-img{
width:100%;
height:100%;
object-fit:contain;
}

.logo-text{
font-size:26px;
font-weight:900;
color:#fff;
}

.logo-text span{
color:var(--gold);
}

/* NAV */
nav{
display:flex;
gap:12px;
align-items:center;
}

.nav-link{
color:#fff;
font-weight:700;
font-size:14px;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.nav-link:hover{
background:rgba(255,255,255,0.1);
}

.nav-link.active{
background:var(--gold);
color:#000;
}

/* HERO */
.hero{
padding:60px 20px;
text-align:center;
background:
linear-gradient(rgba(10,30,20,0.85),rgba(10,30,20,0.9)),
url('https://images.unsplash.com/photo-1548767797-d8c844163c4c?q=80&w=1400&auto=format&fit=crop') center/cover;
color:#fff;
}

.hero h1{
font-size:44px;
font-weight:900;
margin-bottom:10px;
}

.hero p{
max-width:700px;
margin:auto;
opacity:0.9;
line-height:1.7;
}

/* LAYOUT */
.wrapper{
display:grid;
grid-template-columns:260px 1fr;
gap:20px;
padding:25px;
}

/* SIDEBAR */
.sidebar{
background:#fff;
padding:20px;
border-radius:20px;
height:fit-content;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.search-box input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
outline:none;
margin-bottom:18px;
}

.filter-item{
display:flex;
gap:8px;
margin-bottom:10px;
font-size:14px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.3s;
border:1px solid rgba(0,0,0,0.05);
}

.card:hover{
transform:translateY(-6px);
}

.card-image{
height:190px;
overflow:hidden;
background:#f3f6f4;
}

.card-image img{
width:100%;
height:100%;
object-fit:cover;
}

.card-content{
padding:16px;
display:flex;
flex-direction:column;
gap:10px;
}

.category{
display:inline-block;
padding:6px 10px;
border-radius:999px;
background:#eef7f2;
color:var(--primary);
font-size:11px;
font-weight:800;
width:fit-content;
}

.card h3{
font-size:17px;
font-weight:900;
}

.description{
font-size:13px;
color:var(--muted);
line-height:1.5;
min-height:38px;
}

.price{
font-size:20px;
font-weight:900;
color:var(--primary);
}

.btn{
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#0f3d2e,#145c46);
color:#fff;
font-weight:800;
cursor:pointer;
}

/* CART */
#cartDrawer{
position:fixed;
top:0;
right:-420px;
width:360px;
height:100%;
background:#fff;
transition:0.4s;
z-index:2000;
box-shadow:-10px 0 30px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

#cartDrawer.active{right:0;}

.cart-header{
padding:20px;
font-size:20px;
font-weight:900;
border-bottom:1px solid #eee;
}

.cart-items{
flex:1;
overflow:auto;
padding:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:14px;
background:#f7faf8;
border-radius:14px;
margin-bottom:10px;
}

.cart-footer{
padding:18px;
border-top:1px solid #eee;
}

.total{
font-size:18px;
font-weight:900;
margin-bottom:12px;
}

.cart-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:800;
cursor:pointer;
margin-bottom:8px;
}

.checkout{background:var(--primary);color:#fff;}
.clear{background:#eee;}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:none;
z-index:1500;
}

#overlay.active{display:block;}

/* EMPTY STATE */
.empty{
text-align:center;
padding:30px;
color:#666;
}

@media(max-width:900px){
.wrapper{grid-template-columns:1fr;}
.hero h1{font-size:32px;}
}

</style>
</head>

<body>

<header>
<div class="logo-area">
<div class="logo-image-wrapper">
<img src="./asset/image/image.png" class="logo-img">
</div>
<div class="logo-text"><span>Wintoliz</span> Farms</div>
</div>

<nav>
<div class="nav-link active">Marketplace</div>
<div class="nav-link">Cart (<span id="cartCount">0</span>)</div>
</nav>
</header>

<section class="hero">
<h1>Fresh Poultry Products Across Nigeria</h1>
<p>Buy healthy birds, eggs, vaccines, feeds and equipment directly from trusted farms.</p>
</section>

<div class="wrapper">

<div class="sidebar">
<h3>Search</h3>
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products...">
</div>

<h3>Categories</h3>

<label class="filter-item"><input type="checkbox" class="filter" value="Eggs"> Eggs</label>
<label class="filter-item"><input type="checkbox" class="filter" value="Flock"> Flock</label>
<label class="filter-item"><input type="checkbox" class="filter" value="Drugs"> Drugs</label>

</div>

<div class="products" id="products">
<div class="empty">Loading products...</div>
</div>

</div>

<!-- CART -->
<div id="cartDrawer">
<div class="cart-header">Shopping Cart</div>
<div class="cart-items" id="cartItems"></div>

<div class="cart-footer">
<div class="total">Total: ₦<span id="total">0</span></div>
<button class="cart-btn checkout" onclick="placeOrder()">Checkout</button>
<button class="cart-btn clear" onclick="clearCart()">Clear Cart</button>
</div>
</div>

<div id="overlay" onclick="closeCart()"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDVFSZlzB8F9xztB8F9xzt2eWQAVKtS8BBgJ5FCu8",
authDomain: "wintoliz-2dca5.firebaseapp.com",
projectId: "wintoliz-2dca5",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(!user) window.location.href="index.html";
});

/* CART */
let cart=[];

window.addToCart=function(name,price){
cart.push({name,price});
updateCart();
openCart();
}

function updateCart(){
let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price;
box.innerHTML+=`
<div class="cart-item">
<strong>${i.name}</strong>
<span>₦${i.price.toLocaleString()}</span>
</div>`;
});

document.getElementById("total").innerText=total.toLocaleString();
document.getElementById("cartCount").innerText=cart.length;
}

window.openCart=()=>document.getElementById("cartDrawer").classList.add("active");
window.closeCart=()=>document.getElementById("cartDrawer").classList.remove("active");

window.clearCart=()=>{
cart=[];
updateCart();
}

/* PRODUCTS FIXED */
async function loadProducts(){

const container=document.getElementById("products");

try{

container.innerHTML="<div class='empty'>Loading products...</div>";

const snap=await getDocs(collection(db,"products"));

container.innerHTML="";

if(snap.empty){
container.innerHTML="<div class='empty'>No products found in database</div>";
return;
}

snap.forEach(doc=>{
const p=doc.data();

container.innerHTML+=`
<div class="card">
<div class="card-image">
<img src="${p.image || ''}">
</div>

<div class="card-content">
<div class="category">${p.category || 'Uncategorized'}</div>
<h3>${p.name || 'No Name'}</h3>
<p class="description">${p.description || ''}</p>
<div class="price">₦${Number(p.price || 0).toLocaleString()}</div>

<button class="btn" onclick="addToCart('${p.name}',${p.price})">
Add to Cart
</button>

</div>
</div>
`;
});

}catch(err){
console.error(err);
container.innerHTML="<div class='empty'>Error loading products</div>";
}

}

loadProducts();

/* CHECKOUT */
window.placeOrder=async function(){

if(cart.length===0) return alert("Cart is empty");

await addDoc(collection(db,"orders"),{
items:cart,
total:cart.reduce((s,i)=>s+i.price,0),
createdAt:serverTimestamp()
});

alert("Order placed!");
cart=[];
updateCart();
closeCart();
};

</script>

</body>
</html>

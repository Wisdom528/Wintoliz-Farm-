<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Farms Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:480px;
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo{
font-size:32px;
font-weight:bold;
color:#0f3d2e;
margin-bottom:10px;
text-align:center;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-group input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

.create-btn{
width:100%;
padding:15px;
background:#0f3d2e;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.login-link{
margin-top:25px;
text-align:center;
}

.login-link a{
color:#0f3d2e;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Wintoliz Farms</div>

<h1>Create Account</h1>

<p class="subtitle">
Start managing your poultry business smarter today.
</p>

<form onsubmit="register(event)">

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Create password" required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>
</div>

<button class="create-btn" type="submit">
Create Account
</button>

<div class="login-link">
Already have an account?
<a href="index.html">Sign In</a>
</div>

</form>

</div>

<script>

function register(event){

event.preventDefault();

window.location.href = "index.html";

}

</script>

</body>
</html>

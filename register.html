<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Farms Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:480px;
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo{
font-size:32px;
font-weight:bold;
color:#0f3d2e;
margin-bottom:10px;
text-align:center;
}

.logo span{
color:#ffb800;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
line-height:1.5;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-group input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
outline:none;
transition:0.3s;
}

.input-group input:focus{
border-color:#0f3d2e;
box-shadow:0 0 0 4px rgba(15,61,46,0.08);
}

.create-btn{
width:100%;
padding:15px;
background:#0f3d2e;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.create-btn:hover{
background:#145c46;
}

.google-btn{
width:100%;
padding:15px;
background:#fff;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

.google-btn:hover{
background:#f7f7f7;
}

.login-link{
margin-top:25px;
text-align:center;
}

.login-link a{
color:#0f3d2e;
font-weight:bold;
text-decoration:none;
}

.message{
margin-top:20px;
text-align:center;
font-weight:bold;
font-size:14px;
}

.success{
color:green;
}

.error{
color:red;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<span>Wintoliz</span> Farms
</div>

<h1>Create Account</h1>

<p class="subtitle">
Start managing your poultry business smarter today.
</p>

<form id="registerForm">

<div class="input-group">
<label>Full Name</label>
<input
type="text"
id="fullname"
placeholder="Enter your full name"
required>
</div>

<div class="input-group">
<label>Email Address</label>
<input
type="email"
id="email"
placeholder="Enter your email"
required>
</div>

<div class="input-group">
<label>Password</label>
<input
type="password"
id="password"
placeholder="Create password"
required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input
type="password"
id="confirmPassword"
placeholder="Confirm password"
required>
</div>

<button class="create-btn" type="submit">
Create Account
</button>

<button type="button" class="google-btn" id="googleSignup">
Continue with Google
</button>

<div id="message" class="message"></div>

<div class="login-link">
Already have an account?
<a href="index.html">Sign In</a>
</div>

</form>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyDVFSZlzB8F9xzt2eWQAVKtS8BBgJ5FCu8",
authDomain: "wintoliz-2dca5.firebaseapp.com",
projectId: "wintoliz-2dca5",
storageBucket: "wintoliz-2dca5.firebasestorage.app",
messagingSenderId: "469698295508",
appId: "1:469698295508:web:5724ec6c9f88dc88fe6d41"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const message = document.getElementById("message");

/* REGISTER USER */
document.getElementById("registerForm")
.addEventListener("submit", async (e) => {

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const confirmPassword =
document.getElementById("confirmPassword").value;

if(password !== confirmPassword){

message.innerHTML = "Passwords do not match!";
message.className = "message error";
return;

}

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

message.innerHTML =
"Account created successfully!";

message.className = "message success";

setTimeout(() => {

window.location.href = "index.html";

},1500);

}catch(error){

message.innerHTML = error.message;
message.className = "message error";

}

});

/* GOOGLE SIGNUP */
document.getElementById("googleSignup")
.addEventListener("click", async () => {

const provider = new GoogleAuthProvider();

try{

await signInWithPopup(auth, provider);

message.innerHTML =
"Google signup successful!";

message.className = "message success";

setTimeout(() => {

window.location.href =
"https://wintolizfarmcom.vercel.app/product.html";

},1000);

}catch(error){

message.innerHTML = error.message;
message.className = "message error";

}

});

</script>

</body>
</html>

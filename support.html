<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wintoliz Support Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--primary:#0f3d2e;
--primary2:#145c46;
--gold:#ffb800;
--bg:#061510;
--card:#0b1f18;
--text:#fff;
--muted:#9ca3af;
--border:rgba(255,255,255,0.08);
--user:#1f7a5a;
--admin:#1b2e27;
--shadow:0 20px 50px rgba(0,0,0,0.45);
}

body{
background:
linear-gradient(rgba(3,10,8,0.92),rgba(3,10,8,0.95)),
url('https://images.unsplash.com/photo-1548767797-d8c844163c4c?q=80&w=1400&auto=format&fit=crop') center/cover fixed;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

/* CONTAINER */

.chat-container{
width:100%;
max-width:1100px;
height:94vh;
background:rgba(7,18,14,0.95);
border:1px solid var(--border);
border-radius:34px;
overflow:hidden;
display:flex;
flex-direction:column;
backdrop-filter:blur(16px);
box-shadow:var(--shadow);
}

/* HEADER */

.chat-header{
padding:18px 24px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.03);
border-bottom:1px solid rgba(255,255,255,0.06);
}

.header-left{
display:flex;
align-items:center;
gap:16px;
}

.avatar{
width:62px;
height:62px;
border-radius:20px;
background:linear-gradient(135deg,#145c46,#1f7a5a);
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:900;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.header-text h2{
font-size:23px;
font-weight:900;
color:#fff;
margin-bottom:4px;
}

.header-text p{
font-size:13px;
color:#8ef0aa;
}

.back-btn{
padding:14px 18px;
border:none;
border-radius:16px;
background:#fff;
color:var(--primary);
font-weight:800;
cursor:pointer;
transition:0.3s;
}

.back-btn:hover{
transform:translateY(-2px);
}

/* CHAT BODY */

.chat-body{
flex:1;
overflow-y:auto;
padding:24px;
display:flex;
flex-direction:column;
gap:18px;
scroll-behavior:smooth;
background:
linear-gradient(rgba(0,0,0,0.08),rgba(0,0,0,0.08)),
url('https://www.transparenttextures.com/patterns/asfalt-light.png');
}

/* MESSAGE */

.message-row{
display:flex;
flex-direction:column;
max-width:78%;
animation:fadeIn .25s ease;
}

.user-row{
align-self:flex-end;
}

.admin-row{
align-self:flex-start;
}

.message{
padding:16px 18px;
border-radius:24px;
line-height:1.7;
font-size:14px;
position:relative;
word-break:break-word;
backdrop-filter:blur(8px);
}

.user-message{
background:linear-gradient(135deg,#1f7a5a,#145c46);
border-bottom-right-radius:8px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.admin-message{
background:#172923;
border-bottom-left-radius:8px;
border:1px solid rgba(255,255,255,0.05);
}

.sender-name{
font-size:12px;
font-weight:800;
margin-bottom:8px;
opacity:0.8;
}

.message-image{
width:100%;
max-width:260px;
border-radius:18px;
margin-top:12px;
border:2px solid rgba(255,255,255,0.08);
display:block;
}

.message-footer{
display:flex;
justify-content:flex-end;
align-items:center;
gap:6px;
margin-top:10px;
font-size:11px;
opacity:0.72;
}

.tick{
font-size:13px;
font-weight:900;
}

.seen{
color:#4ade80;
}

.not-seen{
color:#fff;
}

/* INPUT AREA */

.chat-input-area{
padding:18px;
background:rgba(255,255,255,0.03);
border-top:1px solid rgba(255,255,255,0.06);
}

.preview-box{
display:none;
background:#081811;
padding:14px;
border-radius:20px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,0.06);
}

.preview-box img{
width:100%;
max-width:180px;
border-radius:14px;
margin-top:10px;
}

.chat-form{
display:flex;
align-items:flex-end;
gap:12px;
background:#081811;
padding:12px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.06);
}

.textarea{
flex:1;
background:transparent;
border:none;
outline:none;
resize:none;
height:56px;
max-height:120px;
padding:14px 6px;
font-size:14px;
color:#fff;
}

.textarea::placeholder{
color:#7d8b84;
}

.action-btn{
width:54px;
height:54px;
border:none;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
cursor:pointer;
transition:0.3s;
flex-shrink:0;
}

.upload-btn{
background:#123b2f;
color:#fff;
}

.send-btn{
background:linear-gradient(135deg,#0f3d2e,#145c46,#1f7a5a);
color:#fff;
font-weight:900;
}

.action-btn:hover{
transform:scale(1.05);
}

.file-input{
display:none;
}

/* SCROLLBAR */

.chat-body::-webkit-scrollbar{
width:6px;
}

.chat-body::-webkit-scrollbar-thumb{
background:#1f7a5a;
border-radius:999px;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:768px){

body{
padding:0;
}

.chat-container{
height:100vh;
border-radius:0;
}

.chat-header{
padding:16px;
}

.header-text h2{
font-size:20px;
}

.message-row{
max-width:92%;
}

.chat-body{
padding:18px;
}

}

</style>
</head>

<body>

<div class="chat-container">

<!-- HEADER -->

<div class="chat-header">

<div class="header-left">

<div class="avatar">
🎧
</div>

<div class="header-text">

<h2>
Wintoliz Support
</h2>

<p>
Online • Secure Private Chat
</p>

</div>

</div>

<button
class="back-btn"
onclick="window.location.href='dashboard.html'">
Dashboard
</button>

</div>

<!-- CHAT BODY -->

<div class="chat-body" id="chatBody">
</div>

<!-- INPUT -->

<div class="chat-input-area">

<div class="preview-box" id="previewBox">

<div style="font-size:13px;font-weight:700;">
Image Preview
</div>

<img id="previewImage">

</div>

<div class="chat-form">

<button
class="action-btn upload-btn"
type="button"
onclick="document.getElementById('fileInput').click()">
📎
</button>

<textarea
class="textarea"
id="messageInput"
placeholder="Type your message..."></textarea>

<input
type="file"
accept="image/*"
id="fileInput"
class="file-input">

<button
class="action-btn send-btn"
type="button"
onclick="sendMessage()">
➤
</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
onSnapshot,
serverTimestamp,
orderBy,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyDVFSZlzB8F9xzt2eWQAVKtS8BBgJ5FCu8",

authDomain: "wintoliz-2dca5.firebaseapp.com",

projectId: "wintoliz-2dca5",

storageBucket: "wintoliz-2dca5.firebasestorage.app",

messagingSenderId: "469698295508",

appId: "1:469698295508:web:5724ec6c9f88dc88fe6d41"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* USER */

const currentUser =
JSON.parse(localStorage.getItem("wintolizUser")) || {
username:"Guest"
};

const username =
currentUser.username || "Guest";

/* PRIVATE CHAT */

let supportChatId =
localStorage.getItem("supportChatId");

if(!supportChatId){

supportChatId =
"CHAT-" + Date.now();

localStorage.setItem(
"supportChatId",
supportChatId
);

}

/* ELEMENTS */

const chatBody =
document.getElementById("chatBody");

const messageInput =
document.getElementById("messageInput");

const fileInput =
document.getElementById("fileInput");

const previewBox =
document.getElementById("previewBox");

const previewImage =
document.getElementById("previewImage");

let uploadedImage = "";

/* FILE */

fileInput.addEventListener("change",(e)=>{

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

uploadedImage =
event.target.result;

previewBox.style.display =
"block";

previewImage.src =
uploadedImage;

};

reader.readAsDataURL(file);

});

/* SEND */

window.sendMessage =
async function(){

const text =
messageInput.value.trim();

if(text === "" &&
uploadedImage === ""){
return;
}

try{

await addDoc(
collection(db,"supportMessages"),
{

chatId:supportChatId,

username:username,

text:text,

image:uploadedImage,

sender:"user",

seen:false,

createdAt:serverTimestamp(),

time:new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

}
);

messageInput.value = "";

uploadedImage = "";

fileInput.value = "";

previewBox.style.display =
"none";

}
catch(error){

console.log(error);

alert(error.message);

}

};

/* QUERY */

const supportQuery = query(

collection(db,"supportMessages"),

where("chatId","==",supportChatId),

orderBy("createdAt","asc")

);

/* REALTIME */

onSnapshot(supportQuery,async(snapshot)=>{

chatBody.innerHTML = '';

/* WELCOME */

chatBody.innerHTML += `

<div class="message-row admin-row">

<div class="message admin-message">

<div class="sender-name">
Support Team
</div>

Hello ${username} 👋

<br><br>

Welcome to Wintoliz Support.

<br><br>

✅ Send payment screenshot
<br>
✅ Send payment details
<br>
✅ Send amount paid

<div class="message-footer">
Support Team
</div>

</div>

</div>

`;

for(const item of snapshot.docs){

const chat = {
id:item.id,
...item.data()
};

/* MARK ADMIN MSG SEEN */

if(
chat.sender === "admin" &&
chat.seen !== true
){

await updateDoc(
doc(db,"supportMessages",chat.id),
{
seen:true
}
);

}

chatBody.innerHTML += `

<div class="message-row
${chat.sender === 'admin'
? 'admin-row'
: 'user-row'}">

<div class="message
${chat.sender === 'admin'
? 'admin-message'
: 'user-message'}">

<div class="sender-name">

${chat.sender === 'admin'
? 'Support Team'
: chat.username}

</div>

${chat.text || ''}

${chat.image ? `

<img
src="${chat.image}"
class="message-image">

` : ''}

<div class="message-footer">

${chat.time || ''}

${chat.sender === 'user'
? `

<span class="tick
${chat.seen ? 'seen' : 'not-seen'}">

${chat.seen ? '✔✔' : '✔'}

</span>

`
: ''}

</div>

</div>

</div>

`;

}

/* AUTO SCROLL */

chatBody.scrollTop =
chatBody.scrollHeight;

});

/* ENTER SEND */

messageInput.addEventListener(
"keydown",
(e)=>{

if(
e.key === "Enter" &&
!e.shiftKey
){

e.preventDefault();

window.sendMessage();

}

}
);

</script>

</body>
</html>
